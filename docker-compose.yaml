services:
  # --- Infrastructure ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  # --- Microservices ---
  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8001:8001"
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    restart: unless-stopped

  inventory-service:
    build: ./services/inventory-service
    container_name: inventory-service
    ports:
      - "8002:8002"
    restart: unless-stopped

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "8003:8003"
    restart: unless-stopped

  # --- Background Worker ---
  fulfillment-worker:
    build: ./services/fulfillment-worker
    container_name: fulfillment-worker
    ports:
      - "8004:8004"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - INVENTORY_URL=http://inventory-service:8002
      - PAYMENT_URL=http://payment-service:8003
    depends_on:
      - rabbitmq
      - inventory-service
      - payment-service
    restart: unless-stopped

  # --- Frontend ---
  web:
    build: ./web
    container_name: web
    ports:
      - "7070:80"
    depends_on:
      - order-service
      - inventory-service
      - payment-service
    restart: unless-stopped

  # --- Load Generator ---
  load-generator:
    build: ./services/load-generator
    container_name: load-generator
    depends_on:
      - order-service
      - inventory-service
      - payment-service
    restart: unless-stopped
